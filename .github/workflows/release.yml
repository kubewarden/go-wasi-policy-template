on:
  push:
    branches:
      - main
    tags:
      - "v*"

name: Release policy

jobs:
  test:
    name: run tests and linters
    uses: kubewarden/github-actions/.github/workflows/reusable-test-policy-go-wasi.yml@f301a7874dd642510fff54a89e4329881bf871ef # v4.6.0

  release:
    needs: test
    permissions:
      # Required to create GH releases
      contents: write
      # Required to push to GHCR
      packages: write
      # Required by cosign keyless signing
      id-token: write

    uses: kubewarden/github-actions/.github/workflows/reusable-release-policy-go-wasi.yml@f301a7874dd642510fff54a89e4329881bf871ef # v4.6.0
    with:
      oci-target: ghcr.io/${{ github.repository_owner }}/tests/go-wasi-template
