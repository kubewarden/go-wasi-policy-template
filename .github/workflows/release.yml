on:
  push:
    branches:
      - main
    tags:
      - "v*"

name: Release policy

jobs:
  test:
    name: run tests and linters
    uses: kubewarden/github-actions/.github/workflows/reusable-test-policy-go-wasi.yml@e57db07ca384bf09ec40c4c49ff25d600c0d23d9 # v5.1.1

  release:
    needs: test
    permissions:
      # Required to create GH releases
      contents: write
      # Required to push to GHCR
      packages: write
      # Required by cosign keyless signing
      id-token: write

    uses: kubewarden/github-actions/.github/workflows/reusable-release-policy-go-wasi.yml@e57db07ca384bf09ec40c4c49ff25d600c0d23d9 # v5.1.1
    with:
      oci-target: ghcr.io/${{ github.repository_owner }}/tests/go-wasi-template
